services:
  mysql:
    image: mysql:8.0
    container_name: pressure-mysql
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: blood_pressure_tracker
    ports:
      - "3307:3306"
    volumes:
      - ./db/blood_pressure_tracker.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
      interval: 10s
      timeout: 5s
      retries: 5

  node:
    build: .
    container_name: pressure-node
    restart: always
    ports:
      - "8082:7291"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: blood_pressure_tracker
      SWAGGER_SERVER: http://localhost:8082
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    depends_on:
      mysql:
        condition: service_healthy